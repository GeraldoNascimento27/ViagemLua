<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaina+2:wght@700;800&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <nav>
            <img src="Logo.png" alt="logo">
            <div id="menu">
                <h3>QUEM SOMOS</h3>
                <h3>NOSSO PROPÓSITO</h3>
                <h3>SUPORTE</h3>
            </div>

        </nav>
    </header>
    <div id="containers">
        <div id="esquerda">
            <h1>INSCREVA-SE E VIAJE PARA A LUA GRATUITAMENTE</h1>
            <form id="inputs">
                <input id="nome" type="text" placeholder="Nome">
                <span id="valNome"></span>
                <input id="email" type="email" placeholder="Seu melhor email">
                <div id="buttons">
                    <button id="ir">Quero ir pra lua!</button>
                    <button>Mais informações</button>
                </div>
            
            </form>
            

        </div>
        <div id="direita">
            <img src="hero.png" alt="imagem">
        </div>

    </div>
<script src="script.js"></script>
</body>

</html>
